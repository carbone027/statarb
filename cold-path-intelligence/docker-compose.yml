

services:
  questdb:
    image: questdb/questdb:latest
    container_name: questdb-statarb
    ports:
      - "9000:9000" # REST Web Console
      - "8812:8812" # Postgres wire protocol (for ADBC)
      - "9009:9009" # InfluxDB Line Protocol (for high-perf insertion)
    volumes:
      - questdb-data:/var/lib/questdb
    environment:
      - QDB_CAIRO_COMMIT_LAG=1000 # Optimizations for high-frequency inserts

volumes:
  questdb-data:
